<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Resume Builder</title>

<link rel="stylesheet" href="style.css">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

<h1 class="title">AI Resume Builder</h1>

<div class="container">

<!-- FORM -->

<div class="form">

<input id="name" placeholder="Full Name" oninput="updateResume()">

<input id="role" placeholder="Job Role" oninput="updateResume()">

<textarea id="skills" placeholder="Skills" oninput="updateResume()"></textarea>

<textarea id="experience" placeholder="Experience" oninput="updateResume()"></textarea>

<button onclick="payNow()">Download PDF</button>

</div>


<!-- PREVIEW -->

<div class="preview" id="preview">

<h2 id="pname">Your Name</h2>

<h3 id="prole">Job Role</h3>

<h4>Skills</h4>

<p id="pskills">Your skills will appear here</p>

<h4>Experience</h4>

<p id="pexperience">Your experience will appear here</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
