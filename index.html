<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevTools Hub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

<h2>DevTools Hub</h2>

</nav>

<section class="tools">

<div class="tool">

<h3>Password Generator</h3>

<input id="length" placeholder="Password Length">

<button onclick="generatePassword()">Generate</button>

<p id="password"></p>

</div>


<div class="tool">

<h3>JSON Formatter</h3>

<textarea id="jsonInput"></textarea>

<button onclick="formatJSON()">Format</button>

<pre id="jsonOutput"></pre>

</div>


<div class="tool">

<h3>Color Generator</h3>

<button onclick="generateColor()">Generate</button>

<div id="colorBox"></div>

<p id="colorCode"></p>

</div>


<div class="tool">

<h3>Base64 Encoder</h3>

<textarea id="baseInput"></textarea>

<button onclick="encodeBase()">Encode</button>

<p id="baseOutput"></p>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
